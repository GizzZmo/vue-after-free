name: Generate Assets

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - "tools/generate_text_images.py"
      - "src/download0/languages.ts"
  workflow_dispatch:

jobs:
  generate-text-images:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-dejavu

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install arabic-reshaper python-bidi Pillow

      - name: Generate text images
        run: python tools/generate_text_images.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate localised text images"
          file_pattern: "src/download0/img/text/**"
          branch: ${{ github.head_ref || github.ref_name }}
